name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Aiken
        run: cargo install aiken --version 1.1.21

      - name: Check contracts
        run: aiken check 2>&1 || (aiken check --trace-level verbose 2>&1; exit 1)

      - name: Build contracts
        run: aiken build

      - name: Test contracts
        run: aiken check

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plutus-scripts
          path: plutus.json
