name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Aiken
        run: |
          AIKEN_VERSION="v1.1.9"
          mkdir -p aiken-extract
          curl -sSL "https://github.com/aiken-lang/aiken/releases/download/${AIKEN_VERSION}/aiken-x86_64-unknown-linux-gnu.tar.gz" -o aiken.tar.gz
          tar -xzf aiken.tar.gz -C aiken-extract
          find aiken-extract -name "aiken" -type f -exec sudo mv {} /usr/local/bin/aiken \;
          sudo chmod +x /usr/local/bin/aiken
          aiken --version

      - name: Check contracts
        run: aiken check

      - name: Build contracts
        run: aiken build

      - name: Test contracts
        run: aiken check

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plutus-scripts
          path: plutus.json
